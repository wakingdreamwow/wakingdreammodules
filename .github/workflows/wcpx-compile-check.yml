name: WCPX compile check (AzerothCore + TrinityCore 3.3.5)

# Header-only "does it still compile" check for mod-character-portability
# against upstream AzerothCore + TrinityCore 3.3.5. Not a full worldserver
# build (too slow for per-commit CI); we compile just the module's .cpp
# files with -c against each core's public headers.
#
# When this fails: a core moved an API surface we depend on. Update the
# affected mod file (and PORTING-*.md if the fix would benefit other
# adopters), and re-run.

on:
  push:
    paths:
      - 'mod-character-portability/**'
      - 'mod-character-portability-tc335/**'
      - '.github/workflows/wcpx-compile-check.yml'
  pull_request:
    paths:
      - 'mod-character-portability/**'
      - 'mod-character-portability-tc335/**'
      - '.github/workflows/wcpx-compile-check.yml'
  workflow_dispatch:
  schedule:
    # Weekly Monday 05:00 UTC so we catch upstream API drift even without commits.
    - cron: '0 5 * * 1'

jobs:
  compile-azerothcore:
    name: Compile against AzerothCore master
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout mod
        uses: actions/checkout@v4
        with:
          path: mod

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libssl-dev libboost-all-dev libbz2-dev libmariadb-dev \
            libreadline-dev cmake libargon2-dev git

      - name: Shallow clone AzerothCore
        run: git clone --depth 1 https://github.com/azerothcore/azerothcore-wotlk.git ac

      - name: Header-only compile check (AC)
        working-directory: mod/mod-character-portability/src
        env:
          AC_ROOT: ${{ github.workspace }}/ac
        run: |
          # Include path list mirrors what AC's own CMakeLists exposes to
          # modules. Verified 2026-07-15 against AC HEAD tree layout.
          INC="-I. -I./third_party \
            -I$AC_ROOT/src/common \
            -I$AC_ROOT/src/common/Asio \
            -I$AC_ROOT/src/common/Debugging \
            -I$AC_ROOT/src/common/Logging \
            -I$AC_ROOT/src/common/Threading \
            -I$AC_ROOT/src/common/Utilities \
            -I$AC_ROOT/src/common/Configuration \
            -I$AC_ROOT/src/server/database \
            -I$AC_ROOT/src/server/database/Database \
            -I$AC_ROOT/src/server/database/Database/Implementation \
            -I$AC_ROOT/src/server/database/Field \
            -I$AC_ROOT/src/server/database/Logging \
            -I$AC_ROOT/src/server/game \
            -I$AC_ROOT/src/server/game/Chat \
            -I$AC_ROOT/src/server/game/Chat/ChatCommands \
            -I$AC_ROOT/src/server/game/Entities/Item \
            -I$AC_ROOT/src/server/game/Entities/Player \
            -I$AC_ROOT/src/server/game/Entities/Object \
            -I$AC_ROOT/src/server/game/Entities/Unit \
            -I$AC_ROOT/src/server/game/Entities/Creature \
            -I$AC_ROOT/src/server/game/Entities/GameObject \
            -I$AC_ROOT/src/server/game/Entities/Corpse \
            -I$AC_ROOT/src/server/game/Entities/DynamicObject \
            -I$AC_ROOT/src/server/game/Entities/Pet \
            -I$AC_ROOT/src/server/game/Entities/Vehicle \
            -I$AC_ROOT/src/server/game/Globals \
            -I$AC_ROOT/src/server/game/Spells \
            -I$AC_ROOT/src/server/game/Spells/Auras \
            -I$AC_ROOT/src/server/game/Accounts \
            -I$AC_ROOT/src/server/game/Server \
            -I$AC_ROOT/src/server/game/Server/Protocol \
            -I$AC_ROOT/src/server/game/Scripting \
            -I$AC_ROOT/src/server/game/Cache \
            -I$AC_ROOT/src/server/game/Miscellaneous \
            -I$AC_ROOT/src/server/shared \
            -I$AC_ROOT/src/server/shared/Common \
            -I$AC_ROOT/src/server/shared/DataStores \
            -I$AC_ROOT/deps/utf8cpp/source"
          FAIL=0
          for f in *.cpp; do
            echo "=== compile $f ==="
            g++ -std=c++17 -fsyntax-only $INC "$f" 2>&1 | tee /tmp/log-$f.txt || true
            if grep -q 'error:' /tmp/log-$f.txt; then
              echo "::error file=$f::compile failure — see log"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo "AC compile check failed. This means AzerothCore master moved an API surface."
            exit 1
          fi

  compile-trinitycore-3.3.5:
    name: Compile against TrinityCore 3.3.5 (preview)
    runs-on: ubuntu-24.04
    continue-on-error: true   # preview branch — failures notify but don't block
    steps:
      - name: Checkout mod
        uses: actions/checkout@v4
        with:
          path: mod

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libssl-dev libboost-all-dev libbz2-dev libmariadb-dev \
            libreadline-dev cmake libargon2-dev git

      - name: Shallow clone TrinityCore 3.3.5
        run: git clone --depth 1 -b 3.3.5 https://github.com/TrinityCore/TrinityCore.git tc

      - name: Header-only compile check (TC-335)
        working-directory: mod/mod-character-portability-tc335/src
        env:
          TC_ROOT: ${{ github.workspace }}/tc
        run: |
          # Include path list mirrors what TC's own CMakeLists exposes to
          # scripts. Verified 2026-07-15 against TC 3.3.5 tree layout.
          INC="-I. -I./third_party \
            -I$TC_ROOT/src/common \
            -I$TC_ROOT/src/common/Asio \
            -I$TC_ROOT/src/common/Debugging \
            -I$TC_ROOT/src/common/Logging \
            -I$TC_ROOT/src/common/Threading \
            -I$TC_ROOT/src/common/Utilities \
            -I$TC_ROOT/src/common/Configuration \
            -I$TC_ROOT/src/server/database \
            -I$TC_ROOT/src/server/database/Database \
            -I$TC_ROOT/src/server/database/Database/Implementation \
            -I$TC_ROOT/src/server/database/Field \
            -I$TC_ROOT/src/server/database/Logging \
            -I$TC_ROOT/src/server/game \
            -I$TC_ROOT/src/server/game/Chat \
            -I$TC_ROOT/src/server/game/Chat/ChatCommands \
            -I$TC_ROOT/src/server/game/Entities/Item \
            -I$TC_ROOT/src/server/game/Entities/Player \
            -I$TC_ROOT/src/server/game/Entities/Object \
            -I$TC_ROOT/src/server/game/Entities/Unit \
            -I$TC_ROOT/src/server/game/Entities/Creature \
            -I$TC_ROOT/src/server/game/Entities/GameObject \
            -I$TC_ROOT/src/server/game/Entities/Corpse \
            -I$TC_ROOT/src/server/game/Entities/DynamicObject \
            -I$TC_ROOT/src/server/game/Entities/Pet \
            -I$TC_ROOT/src/server/game/Entities/Vehicle \
            -I$TC_ROOT/src/server/game/Globals \
            -I$TC_ROOT/src/server/game/Spells \
            -I$TC_ROOT/src/server/game/Spells/Auras \
            -I$TC_ROOT/src/server/game/Accounts \
            -I$TC_ROOT/src/server/game/Server \
            -I$TC_ROOT/src/server/game/Server/Protocol \
            -I$TC_ROOT/src/server/game/Scripting \
            -I$TC_ROOT/src/server/game/Cache \
            -I$TC_ROOT/src/server/game/Miscellaneous \
            -I$TC_ROOT/src/server/shared \
            -I$TC_ROOT/src/server/shared/Common \
            -I$TC_ROOT/src/server/shared/DataStores \
            -I$TC_ROOT/dep/utf8cpp/source \
            -I$TC_ROOT/dep/boost"
          FAIL=0
          for f in *.cpp; do
            echo "=== compile $f ==="
            g++ -std=c++17 -fsyntax-only $INC "$f" 2>&1 | tee /tmp/log-tc-$f.txt || true
            if grep -q 'error:' /tmp/log-tc-$f.txt; then
              echo "::warning file=$f::TC compile failure — port may need updates"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo "::warning::TC-335 preview compile broke. Update mod-character-portability-tc335/ or note in PORTING-TC335.md."
            exit 1
          fi
