name: WCPX compile check (AzerothCore + TrinityCore 3.3.5)

# Header-only "does it still compile" check for mod-character-portability
# against upstream AzerothCore + TrinityCore 3.3.5. Not a full worldserver
# build (too slow for per-commit CI); we compile just the module's .cpp
# files with -c against each core's public headers.
#
# When this fails: a core moved an API surface we depend on. Update the
# affected mod file (and PORTING-*.md if the fix would benefit other
# adopters), and re-run. Full compiler output is uploaded as an artifact
# so you can download it from the run summary page.

on:
  push:
    paths:
      - 'mod-character-portability/**'
      - 'mod-character-portability-tc335/**'
      - '.github/workflows/wcpx-compile-check.yml'
  pull_request:
    paths:
      - 'mod-character-portability/**'
      - 'mod-character-portability-tc335/**'
      - '.github/workflows/wcpx-compile-check.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'   # Weekly Monday 05:00 UTC — catches upstream drift

jobs:
  compile-azerothcore:
    name: Compile against AzerothCore master
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout mod
        uses: actions/checkout@v5
        with:
          path: mod

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libssl-dev libboost-all-dev libbz2-dev libmariadb-dev \
            libreadline-dev cmake libargon2-dev libfmt-dev git

      - name: Shallow clone AzerothCore
        run: git clone --depth 1 https://github.com/azerothcore/azerothcore-wotlk.git ac

      - name: Header-only compile check (AC)
        working-directory: mod/mod-character-portability/src
        env:
          AC_ROOT: ${{ github.workspace }}/ac
        run: |
          set +e   # never let a single command fail the step; we gate on log grep
          mkdir -p /tmp/wcpx-logs

          # Verify build deps are actually present.
          ls /usr/include/boost/version.hpp /usr/include/argon2.h > /dev/null || \
            { echo "::error::missing boost or argon2 headers"; exit 1; }

          # Build INCLUDE_ARGS dynamically: -I every directory that either
          # contains a header directly OR contains a subdirectory with headers
          # (e.g. `G3D/platform.h` needs -I on `deps/g3dlite/include/`, not on
          # `deps/g3dlite/include/G3D/`). We emit both %h and its parent then
          # dedupe, which covers both flavours.
          # Prune platform-specific / MSVC-shim dirs — they shadow libc headers
          # with Windows-only #error stubs on Linux.
          # Collect header-containing dirs (%h) AND their parents. Emit src/
          # tree first so its `Log.h`/`Common.h` etc. have priority over any
          # `Log.h` shadowed inside third-party deps (g3dlite/G3D/Log.h).
          INC="-I. -I./third_party"
          collect() {
            find "$1" \
              -type d \( -name node_modules -o -name .git -o -name msvc_compat \
                       -o -name Win32 -o -name win32 -o -name windows \
                       -o -name jemalloc -o -name gsoap -o -name internal \) -prune -o \
              -type f \( -name '*.h' -o -name '*.hpp' \) -printf '%h\n%h/..\n' 2>/dev/null \
              | xargs -I{} sh -c 'cd "{}" 2>/dev/null && pwd' \
              | sort -u
          }
          for d in $(collect "$AC_ROOT/src") $(collect "$AC_ROOT/deps"); do
            case "$d" in
              */msvc_compat*|*/windows/*|*/win32/*|*/Win32/*|*/vc/*|*/msvc/*|*/darwin/*|*/mac/*) continue ;;
              */g3dlite/include/G3D) continue ;;   # its Log.h shadows TC/AC Log.h
            esac
            INC="$INC -I$d"
          done

          echo "::group::Include path summary"
          echo "$INC" | tr ' ' '\n' | grep -c '^-I' | xargs -I{} echo "  {} include dirs"
          echo "::endgroup::"

          FAIL=0
          for f in *.cpp; do
            LOG=/tmp/wcpx-logs/ac-$f.log
            echo "::group::compile $f"
            g++ -std=c++20 -fsyntax-only $INC "$f" > "$LOG" 2>&1
            RC=$?
            cat "$LOG"
            echo "::endgroup::"

            # Real errors (line format "path:L:C: error:") — not paths that
            # happen to contain the word "error:".
            ERR_COUNT=$(grep -cE '^[^ ].*:[0-9]+:[0-9]+: (fatal )?error:' "$LOG" || true)
            if [ "$RC" -ne 0 ] || [ "$ERR_COUNT" -gt 0 ]; then
              echo "::error file=$f::compile failure ($ERR_COUNT error line(s), rc=$RC)"
              grep -E '^[^ ].*:[0-9]+:[0-9]+: (fatal )?error:' "$LOG" | head -5
              FAIL=1
            fi
          done

          if [ $FAIL -ne 0 ]; then
            echo "AC compile check failed. Full per-file logs uploaded as workflow artifact."
            exit 1
          fi

      - name: Upload compile logs (AC)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcpx-ac-compile-logs
          path: /tmp/wcpx-logs/ac-*.log
          if-no-files-found: warn
          retention-days: 14

  compile-trinitycore-335:
    name: Compile against TrinityCore 3.3.5 (preview)
    runs-on: ubuntu-24.04
    continue-on-error: true   # preview branch — failures notify but don't gate
    steps:
      - name: Checkout mod
        uses: actions/checkout@v5
        with:
          path: mod

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ libssl-dev libboost-all-dev libbz2-dev libmariadb-dev \
            libreadline-dev cmake libargon2-dev libfmt-dev git

      - name: Shallow clone TrinityCore 3.3.5
        run: git clone --depth 1 -b 3.3.5 https://github.com/TrinityCore/TrinityCore.git tc

      - name: Header-only compile check (TC-335)
        working-directory: mod/mod-character-portability-tc335/src
        env:
          TC_ROOT: ${{ github.workspace }}/tc
        run: |
          set +e
          mkdir -p /tmp/wcpx-logs

          ls /usr/include/boost/version.hpp /usr/include/argon2.h > /dev/null || \
            { echo "::error::missing boost or argon2 headers"; exit 1; }

          INC="-I. -I./third_party"
          collect() {
            find "$1" \
              -type d \( -name node_modules -o -name .git -o -name msvc_compat \
                       -o -name Win32 -o -name win32 -o -name windows \
                       -o -name jemalloc -o -name gsoap -o -name internal \) -prune -o \
              -type f \( -name '*.h' -o -name '*.hpp' \) -printf '%h\n%h/..\n' 2>/dev/null \
              | xargs -I{} sh -c 'cd "{}" 2>/dev/null && pwd' \
              | sort -u
          }
          for d in $(collect "$TC_ROOT/src") $(collect "$TC_ROOT/dep"); do
            case "$d" in
              */msvc_compat*|*/windows/*|*/win32/*|*/Win32/*|*/vc/*|*/msvc/*|*/darwin/*|*/mac/*) continue ;;
              */g3dlite/include/G3D) continue ;;
            esac
            INC="$INC -I$d"
          done

          echo "::group::Include path summary"
          echo "$INC" | tr ' ' '\n' | grep -c '^-I' | xargs -I{} echo "  {} include dirs"
          echo "::endgroup::"

          FAIL=0
          for f in *.cpp; do
            LOG=/tmp/wcpx-logs/tc-$f.log
            echo "::group::compile $f"
            g++ -std=c++20 -fsyntax-only $INC "$f" > "$LOG" 2>&1
            RC=$?
            cat "$LOG"
            echo "::endgroup::"

            ERR_COUNT=$(grep -cE '^[^ ].*:[0-9]+:[0-9]+: (fatal )?error:' "$LOG" || true)
            if [ "$RC" -ne 0 ] || [ "$ERR_COUNT" -gt 0 ]; then
              echo "::warning file=$f::TC compile failure ($ERR_COUNT error line(s), rc=$RC)"
              grep -E '^[^ ].*:[0-9]+:[0-9]+: (fatal )?error:' "$LOG" | head -5
              FAIL=1
            fi
          done

          if [ $FAIL -ne 0 ]; then
            echo "::warning::TC-335 preview compile broke. Full logs in the workflow artifact."
            exit 1
          fi

      - name: Upload compile logs (TC)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcpx-tc-compile-logs
          path: /tmp/wcpx-logs/tc-*.log
          if-no-files-found: warn
          retention-days: 14
